# deepflow configuration

project:
  name: my-project
  source_dir: src/
  specs_dir: specs/

planning:
  # Patterns to search for incomplete work
  search_patterns:
    - "TODO"
    - "FIXME"
    - "HACK"
    - "stub"
    - "placeholder"
    - "it.skip"
    - "test.skip"

parallelism:
  # Agent limits by operation type
  search:
    max: 100
    per_files: 20      # 1 agent per N files
  analyze:
    max: 20
    per_specs: 2       # 1 agent per N specs
  execute:
    max: 5
    per_file: 1        # Never parallel on same file
  test:
    max: 1             # Always sequential

models:
  search: sonnet       # Fast, cheap
  implement: sonnet    # Good balance
  reason: opus         # Complex decisions
  debug: opus          # Problem solving

explore:
  max_tokens: 500      # Controls Explore agent response length
  explore_lsp_timeout_ms: 15000  # Timeout (ms) for the Phase 1 LSP subprocess; on timeout the static template is injected as fallback

commits:
  format: "feat({spec}): {description}"
  atomic: true         # One task = one commit
  push_after: complete # Or "each" for every commit

# Worktree isolation for /df:execute
# Isolates all agent work in a git worktree, keeping main clean
worktree:
  # Enable worktree isolation (default: true)
  enabled: true

  # Base path for worktrees relative to project root
  base_path: .deepflow/worktrees

  # Branch name prefix for worktree branches
  branch_prefix: df/

  # Automatically cleanup worktree after successful verify
  cleanup_on_success: true

  # Keep worktree after failed execution for debugging
  cleanup_on_fail: false

  # Sparse checkout paths (for large monorepos only)
  # When set, worktrees checkout only these directories via git sparse-checkout
  # Leave empty for full checkout (default, works for most repos)
  # Example: ["src/", "tests/", "package.json", "tsconfig.json"]
  sparse_paths: []

# Quality gates for /df:verify
quality:
  # Override auto-detected build command (e.g., "npm run build", "cargo build")
  build_command: ""

  # Override auto-detected test command (e.g., "npm test", "pytest", "go test ./...")
  test_command: ""

  # Test timeout in seconds (default: 300 = 5 minutes)
  test_timeout: 300

  # Retry flaky tests once before failing (default: true)
  test_retry_on_fail: true

  # Three-state: true (force L5), false (skip L5), absent/commented (auto-detect from package.json + browser_assertions)
  # browser_verify:

  # Override the dev server start command for browser verification
  # If empty, deepflow will attempt to auto-detect (e.g., "npm run dev", "yarn dev")
  dev_command: ""

  # Port that the dev server listens on (default: 3000)
  dev_port: 3000

  # Timeout in seconds to wait for the dev server to become ready (default: 30)
  browser_timeout: 30

  # Minimum quality score threshold for harness verification (0.0-1.0, default: 0.6)
  harness_min_score: 0.6

# Ratchet configuration for /df:verify health gate
# Ratchet snapshots baseline metrics (tests passing, coverage, type checks) before execution
# and ensures subsequent runs don't regress. These overrides control which commands ratchet monitors.
ratchet:
  # Override auto-detected build command for ratchet health checks
  # If empty, ratchet will detect from indicator files (package.json scripts, Cargo.toml, etc.)
  # Examples: "npm run build", "cargo build", "go build ./..."
  build_command: ""

  # Override auto-detected test command for ratchet health checks
  # If empty, ratchet will detect from indicator files
  # Examples: "npm test", "pytest", "go test ./...", "cargo test"
  test_command: ""

  # Override auto-detected typecheck command for ratchet health checks
  # If empty, ratchet will detect from indicator files (e.g., "tsc --noEmit" for TypeScript)
  # Examples: "tsc --noEmit", "mypy .", "cargo check"
  typecheck_command: ""

  # Override auto-detected lint command for ratchet health checks
  # If empty, ratchet will detect from indicator files
  # Examples: "eslint .", "flake8", "cargo clippy"
  lint_command: ""

# Spike configuration — shared parent for spike.isolation.* and spike.gate.*
# spike.gate.* keys are owned by the spike-gate spec and will be merged here by integration task T93.
# Both sub-blocks land under this single `spike:` parent to share the namespace.
spike:
  isolation:
    # First port in the pool allocated to parallel spike runners (inclusive).
    # Each running spike claims one port from [port_pool_start, port_pool_end].
    port_pool_start: 40000

    # Last port in the pool allocated to parallel spike runners (inclusive).
    port_pool_end: 40099

    # Maximum number of spikes that may run concurrently.
    # Overflow spikes are queued until a slot is free (REQ-9).
    max_parallel: 3

    # Default outbound network policy for spikes that carry no network_policy frontmatter.
    # "deny"  — all egress blocked (hermetic by default, REQ-4).
    # "allow" — full egress permitted (opt-in for integration spikes).
    network_policy_default: deny

    # Whether to clean up the spike worktree, port, and tmpdir after a failed spike.
    # Set to false to preserve the worktree for post-mortem debugging.
    cleanup_on_fail: true

    # Number of days after which an orphaned spike worktree is garbage-collected.
    # Orphan = worktree still present after its spike finished (e.g. cleanup_on_fail: false).
    worktree_gc_age_days: 7

  # gate:  ← spike.gate.* keys will be added here by T93 (spike-gate integration task)

# Port for `npx deepflow-dashboard serve` (team server mode)
# Default: 3334  (3333 is reserved for local mode)
dashboard_port: 3334

eval:
  # Max tokens of experiment history passed to the mutator prompt during skill evaluation
  max_history_tokens: 4000
  # Future: rework metric (fix count) as secondary signal — requires spec-lineage tracking (not in v1)

# Filter synthesis — LLM-assisted filter proposal (opt-in)
filter_synthesis:
  DF_FILTER_LLM: 0  # Set to 1 to enable LLM-assisted filter synthesis (requires Claude API access)

# Artifact validation — pre-stage existence, consistency, and drift checks
# Runs via hooks/df-artifact-validate.js (PostToolUse) when any of the 5-artifact chain is written.
artifact_validation:
  # Enforcement mode per check family: "hard" (non-zero exit), "advisory" (warn only), "off" (skip)
  # In auto-mode (runtime signal mode==='auto') all advisory entries escalate to hard automatically.
  enforcement:
    existence: hard       # File/symbol/task/edge reference must resolve — default hard
    consistency: advisory # Cross-artifact consistency checks — default advisory
    drift: advisory       # Numeric drift threshold breaches — default advisory

  # Numeric drift thresholds (drift checks are skipped when upstream artifact is missing)
  drift_thresholds:
    # Maximum allowed Jaccard divergence between sketch.md modules and impact.md modules
    # 0.0 = identical sets; 1.0 = completely disjoint. Raise advisory when jaccard_below > this value.
    jaccard_max: 0.4

    # Minimum % of spec likely_files that must be covered by PLAN task slices (0–100)
    # Raise advisory when likely_files_coverage_pct < this value.
    likely_files_min_pct: 50

    # Maximum count of PLAN task Files entries that are not present in impact.md edges
    # Raise advisory when out_of_scope_count > this value.
    out_of_scope_max: 3

# Spike configuration
# Top-level spike: namespace coordinates gate and isolation sub-systems.
# spike.isolation.* will be added here by T93 [INTEGRATION] as a sibling of spike.gate.*.
spike:

  # Gate — pre-execute trigger logic and enforcement (spike-gate spec)
  gate:
    # Trigger thresholds — all values are integer counts unless noted
    triggers:
      # REQ-1: emit spike when symbol fan-out in impact.md exceeds this value
      fanout_max: 8

      # REQ-1: emit spike when subgraph depth in impact.md exceeds this value
      depth_max: 4

      # REQ-2: emit spike when task slice touches more files than this
      slice_files_max: 5

      # REQ-4: emit spike when artifact-validation drift signal exceeds this (jaccard_below or out_of_scope_count)
      drift_max: 0.2

    # REQ-7: maximum spike tasks that can be created for a single spec before blocking
    budget_per_spec: 5

    # REQ-7: wall-clock seconds a spike is allowed to run before it is killed
    timebox_seconds: 120

    # REQ-7: maximum lines of code a spike experiment file may contain
    max_loc: 100

    # REQ-9: enforcement mode — "hard" blocks /df:execute when spike-required is unmet;
    # "advisory" warns only (mirrors hooks/df-invariant-check.js escalation pattern)
    enforcement: hard

# Recommended .gitignore entries
# Add these entries to your .gitignore to exclude instrumentation artifacts
gitignore_entries:
  - "# Deepflow instrumentation artifacts"
  - ".deepflow/token-history.jsonl   # Token usage history from autonomous mode"
  - ".deepflow/report.json           # Instrumentation metrics summary"
